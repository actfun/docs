kind = "mobile"
previewPath = "/mobile/"
title = "MINEPAD Mobile"
version = "1.0.0"
id = "artifacts/actfun-mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 24549

[services.development]
run = "pnpm --filter @workspace/actfun-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/actfun-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/actfun-mobile", "run", "serve" ]

[services.env]
BASE_PATH = "/mobile/"
