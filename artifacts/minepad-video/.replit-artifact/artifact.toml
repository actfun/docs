kind = "video"
previewPath = "/minepad-video/"
title = "MINEPAD — Epic Demo Video"
version = "1.0.0"
id = "artifacts/minepad-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/minepad-video/" ]
localPort = 21164

[services.development]
run = "pnpm --filter @workspace/minepad-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minepad-video", "run", "build" ]
publicDir = "artifacts/minepad-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21164"
BASE_PATH = "/minepad-video/"
